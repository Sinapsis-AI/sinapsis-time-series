[project]
name = "sinapsis-sktime"
version = "0.1.0"
description = "Module for handling time series data and forecasting using sktime."
authors = [
    {name = "SinapsisAI", email = "dev@sinapsis.tech"},
]
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
dependencies = [
    "sinapsis>=0.1.1",
    "sinapsis-data-analysis>=0.1.0",
    "sktime>=0.36.0",
]
[project.optional-dependencies]
pandas = [
    "pandas>=2.2.3",
]

estimators = [
    "arch>=8.0.0",
    "joblib>=1.5.3",
    "numba>=0.63.1",
    "pmdarima>=2.1.1",
    "prophet>=1.3.0",
    "scipy>=1.15.3",
    "statsforecast>=2.0.1",
    "statsmodels>=0.14.6",
    "tsfresh>=0.21.1",
    "tslearn>=0.7.0",
]
torch = [
    "torch>=2.10.0",
]
tensorflow = [
    "tensorflow>=2.18.1",
]

all = ["sinapsis-sktime[pandas]", "sinapsis-sktime[estimators]", "sinapsis-sktime[torch]", "sinapsis-sktime[tensorflow]"]
data-tools = [
    "sinapsis-data-readers[sklearn-datasets,sktime-datareaders]>=0.1.26",
    "sinapsis-data-writers>=0.1.16",
]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
license-files = []

[[tool.uv.index]]
url = "https://pypi.sinapsis.tech/"

[project.urls]
Homepage = "https://sinapsis.tech"
Documentation = "https://docs.sinapsis.tech/docs"
Tutorials = "https://docs.sinapsis.tech/tutorials"
Repository = "https://github.com/Sinapsis-AI/sinapsis-time-series.git"
