[project]
name = "sinapsis-darts-forecasting"
version = "0.1.14"
description = "Module for handling time series data and forecasting using Darts."
authors = [
    {name = "SinapsisAI", email = "dev@sinapsis.tech"},
]
readme = "README.md"
license-files = ["LICENSE"]
requires-python = ">=3.10"
dependencies = [
    "sinapsis>=0.1.1",
    "u8darts[all]>=0.40.0",
]
[project.optional-dependencies]

pandas = [
    "pandas>=2.2.3",
]
all = [
    "sinapsis-darts-forecasting[pandas,time-series-visualization]",
]
time-series-visualization = [
    "matplotlib>=3.10.8",
    "numpy>=1.26.4",
    "pandas>=2.3.3",
    "pillow>=11.3.0",
    "plotly>=6.6.0",
]

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"


[[tool.uv.index]]
url = "https://pypi.sinapsis.tech/"

[tool.uv.sources]
sinapsis-darts-forecasting = { workspace = true }

[project.urls]
Homepage = "https://sinapsis.tech"
Documentation = "https://docs.sinapsis.tech/docs"
Tutorials = "https://docs.sinapsis.tech/tutorials"
Repository = "https://github.com/Sinapsis-AI/sinapsis-time-series.git"
